name: Build Flutter APK

# Runs automatically every time you push to main, and can also be
# triggered manually from the Actions tab ("Run workflow" button).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java (required by Android Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      # This repo ships lib/ + pubspec.yaml only (no android/ios scaffold),
      # so we generate a fresh Flutter project here and merge our source
      # into it before building — same idea as the manual Codespaces steps.
      - name: Create Flutter scaffold and merge project source
        run: |
          flutter create caption_studio
          cp -r lib/* caption_studio/lib/
          cp pubspec.yaml caption_studio/pubspec.yaml
          if [ -d assets ]; then cp -r assets caption_studio/assets; fi

      - name: Add required Android permissions
        run: |
          MANIFEST=caption_studio/android/app/src/main/AndroidManifest.xml
          sed -i 's#<manifest xmlns:android="http://schemas.android.com/apk/res/android">#<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.INTERNET"/>#' "$MANIFEST"
          cat "$MANIFEST"

      - name: Install dependencies
        working-directory: caption_studio
        run: flutter pub get

      - name: Build release APK
        working-directory: caption_studio
        run: flutter build apk --release

      # Uploads the APK as a downloadable artifact on this workflow run's
      # summary page (Actions tab -> this run -> "Artifacts" section).
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: caption-studio-apk
          path: caption_studio/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
