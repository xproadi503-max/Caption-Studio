name: caption_studio
description: Auto-caption generator app with animated subtitle templates (Zeemo-style).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Video playback & picking
  video_player: ^2.9.1
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # Networking (AssemblyAI transcription API)
  http: ^1.2.2

  # FFmpeg - maintained fork (original ffmpeg_kit_flutter is discontinued)
  ffmpeg_kit_flutter_new: ^2.0.1

  # Storage / permissions / paths
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  gal: ^2.3.0          # save exported video to gallery
  share_plus: ^10.1.2  # share exported video

  # State management
  provider: ^6.1.2

  # Local persistence (save API key, recent projects)
  shared_preferences: ^2.3.2

  # Unique ids for caption words/templates
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
